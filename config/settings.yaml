robot:
  name: Nomad
  mode: development

runtime:
  initial_mode: idle
  heartbeat_seconds: 5

voice:
  wakeword: nomad
  language: en-US

ai:
  provider: lmstudio
  fallback_to_echo: true
  lmstudio:
    model: llama-3.2-1b-instruct
    base_url: http://127.0.0.1:1234/v1
    timeout_seconds: 120

logging:
  level: INFO
